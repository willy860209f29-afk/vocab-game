        const { useState, useEffect, useMemo } = React;

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const getLocalPlayerKey = () => {
    let key = localStorage.getItem("local_player_key");
    if (!key) {
        key = crypto.randomUUID();
        localStorage.setItem("local_player_key", key);
    }
    return key;
};

const getOrCreatePlayer = async () => {
    const local_player_key = getLocalPlayerKey();

    const { data: existingPlayer } = await supabaseClient
        .from("players")
        .select("id")
        .eq("local_player_key", local_player_key)
        .maybeSingle();

    if (existingPlayer) return existingPlayer.id;

    const { data: newPlayer, error } = await supabaseClient
        .from("players")
        .insert([{ local_player_key }])
        .select("id")
        .single();

    if (error) {
        console.error("建立玩家失敗", error);
        return null;
    }

    return newPlayer.id;
};
const loadPlayerHistory = async () => {
    try {
        const local_player_key = getLocalPlayerKey();

        const { data: player, error: playerError } = await supabaseClient
            .from("players")
            .select("id")
            .eq("local_player_key", local_player_key)
            .maybeSingle();

        if (playerError) {
            console.error("讀取玩家失敗", playerError);
            return [];
        }

        if (!player) return [];

        const { error: updateError } = await supabaseClient
            .from("players")
            .update({ last_seen_at: new Date().toISOString() })
            .eq("id", player.id);

        if (updateError) {
            console.error("更新 last_seen_at 失敗", updateError);
        }

        const { data: sessions, error: sessionError } = await supabaseClient
            .from("game_sessions")
            .select("score, duration_seconds, played_at")
            .eq("player_id", player.id)
            .order("played_at", { ascending: true });

        if (sessionError) {
            console.error("讀取歷史紀錄失敗", sessionError);
            return [];
        }

        return (sessions || []).map((s) => ({
            score: s.score,
            time: s.duration_seconds
        }));
    } catch (err) {
        console.error("載入歷史資料失敗", err);
        return [];
    }
};
        const loadLevelStats = async () => {
    try {
        const local_player_key = getLocalPlayerKey();

        const { data: player, error: playerError } = await supabaseClient
            .from("players")
            .select("id")
            .eq("local_player_key", local_player_key)
            .maybeSingle();

        if (playerError) {
            console.error("讀取玩家失敗", playerError);
            return null;
        }

        if (!player) return null;

        const { data: answers, error: answersError } = await supabaseClient
            .from("answers")
            .select("level, is_correct")
            .eq("player_id", player.id);

        if (answersError) {
            console.error("讀取等級統計失敗", answersError);
            return null;
        }

        const stats = {
            '1': { correct: 0, total: 0 },
            '2': { correct: 0, total: 0 },
            '3': { correct: 0, total: 0 },
            '4': { correct: 0, total: 0 },
            '5': { correct: 0, total: 0 },
            '6': { correct: 0, total: 0 }
        };

        (answers || []).forEach((a) => {
            const lv = String(a.level);
            if (!stats[lv]) stats[lv] = { correct: 0, total: 0 };

            stats[lv].total += 1;
            if (a.is_correct) stats[lv].correct += 1;
        });

        return stats;
    } catch (err) {
        console.error("載入等級統計失敗", err);
        return null;
    }
};
        const loadWordErrors = async () => {
    try {
        const local_player_key = getLocalPlayerKey();

        const { data: player, error: playerError } = await supabaseClient
            .from("players")
            .select("id")
            .eq("local_player_key", local_player_key)
            .maybeSingle();

        if (playerError) {
            console.error("讀取玩家失敗", playerError);
            return [];
        }

        if (!player) return [];

        const { data: answers, error: answersError } = await supabaseClient
            .from("answers")
            .select("word, level, correct_answer")
            .eq("player_id", player.id)
            .eq("is_correct", false);

        if (answersError) {
            console.error("讀取錯題失敗", answersError);
            return [];
        }

        const errorMap = {};

        (answers || []).forEach((a) => {
            if (!errorMap[a.word]) {
                errorMap[a.word] = {
                    word: a.word,
                    level: a.level,
                    translation: a.correct_answer,
                    errorCount: 0
                };
            }
            errorMap[a.word].errorCount += 1;
        });

        return Object.values(errorMap).sort((a, b) => b.errorCount - a.errorCount);
    } catch (err) {
        console.error("載入常錯單字失敗", err);
        return [];
    }
};

zoom	v./n.	6	快速移動；放大/縮小(鏡頭)；激增`;

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            return lines.map(line => {
                const parts = line.split(/,|\t/);
                return {
                    word: parts[0]?.trim() || '',
                    pos: parts[1]?.trim() || '',
                    level: parts[2]?.trim() || '',
                    translation: parts.slice(3).join('，').trim() || ''
                };
            }).filter(item => item.word && item.word !== '英文單字');
        }
        const ALL_VOCAB = parseCSV(RAW_CSV_DATA);

        const speak = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        };

        const Flashcard = ({ wordInfo }) => {
            const [flipped, setFlipped] = useState(false);
            if (!wordInfo) return null;
            return (
                <div className="w-full h-28 perspective-1000 cursor-pointer mb-1" onClick={() => setFlipped(!flipped)}>
                    <div className={`relative w-full h-full transition-transform duration-500 transform-style-preserve-3d ${flipped ? 'rotate-y-180' : ''}`}>
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-200 rounded-2xl shadow-sm flex flex-col items-center justify-center p-3">
                            <span className="text-lg text-slate-800">{wordInfo.word}</span>
                            <span className="text-[10px] text-slate-400 mt-1 uppercase">{wordInfo.pos} L{wordInfo.level}</span>
                        </div>
                        <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-indigo-50 border border-indigo-100 rounded-2xl flex flex-col items-center justify-center p-3 text-center">
                            <span className="text-base text-indigo-700 leading-tight">{wordInfo.translation}</span>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [appState, setAppState] = useState('home');
            const [playHistory, setPlayHistory] = useState([]);
            const [wordErrors, setWordErrors] = useState([]);
            const [selectedLevels, setSelectedLevels] = useState(['1', '2', '3', '4', '5', '6']);
            const [levelStats, setLevelStats] = useState({ '1': { correct: 0, total: 0 }, '2': { correct: 0, total: 0 }, '3': { correct: 0, total: 0 }, '4': { correct: 0, total: 0 }, '5': { correct: 0, total: 0 }, '6': { correct: 0, total: 0 } });

            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [timeLeft, setTimeLeft] = useState(15);
            const [gameStartTime, setGameStartTime] = useState(null);
            const [gameTotalTime, setGameTotalTime] = useState(0);
            const [sessionMistakes, setSessionMistakes] = useState([]);
            const [showAnswers, setShowAnswers] = useState(false);
            const [selectedOptionId, setSelectedOptionId] = useState(null);
           useEffect(() => {
    const initHistory = async () => {
        const history = await loadPlayerHistory();
        if (history.length > 0) {
            setPlayHistory(history);
        }

        const stats = await loadLevelStats();
        if (stats) {
            setLevelStats(stats);
        }

        const errors = await loadWordErrors();
        if (errors.length > 0) {
            setWordErrors(errors);
        }
    };

    initHistory();
}, []);
            const daysToGSAT = useMemo(() => {
                const diff = new Date('2028-01-15') - new Date();
                return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
            }, []);

            // 數據計算修正
            const totalPlays = playHistory.length;
            const historicalAvg = useMemo(() => {
                if (totalPlays === 0) return 0;
                const sum = playHistory.reduce((a, c) => a + c.score, 0);
                return Math.round(sum / totalPlays);
            }, [playHistory, totalPlays]);

            const recentAvg = useMemo(() => {
                if (totalPlays === 0) return 0;
                const lastThree = playHistory.slice(-3);
                const sum = lastThree.reduce((a, c) => a + c.score, 0);
                return Math.round(sum / lastThree.length);
            }, [playHistory, totalPlays]);

            const progressDiff = totalPlays > 0 ? recentAvg - historicalAvg : 0;

            const topErrorsToDisplay = useMemo(() => {
                return [...wordErrors].sort((a, b) => b.errorCount - a.errorCount).slice(0, 10).sort(() => 0.5 - Math.random()).slice(0, 2);
            }, [wordErrors]);

            const shuffleArray = (a) => [...a].sort(() => Math.random() - 0.5);

            const startGame = () => {
                const filteredVocab = ALL_VOCAB.filter(v => selectedLevels.includes(v.level));
                if (filteredVocab.length < 5) {
                    alert("單字量太少囉，請多選幾個級別！");
                    return;
                }
                const errorWords = filteredVocab.filter(v => wordErrors.find(e => e.word === v.word));
                const pool = shuffleArray(filteredVocab);
                // 題數上限 50 題，若不夠則以現有單字為主
                const qLimit = Math.min(filteredVocab.length, 50);
                const weightedSelection = [...shuffleArray(errorWords).slice(0, 15), ...pool].filter((v, i, self) => self.findIndex(t => t.word === v.word) === i).slice(0, qLimit);
                
                const generated = weightedSelection.map((vocab, i) => {
                    const type = i < (weightedSelection.length / 2) ? 'eng-chi' : 'chi-eng';
                    let distractors = filteredVocab.filter(v => v.pos === vocab.pos && v.word !== vocab.word);
                    if (distractors.length < 3) distractors = filteredVocab.filter(v => v.word !== vocab.word);
                    const options = shuffleArray([vocab, ...shuffleArray(distractors).slice(0, 3)]);
                    return { type, correctWord: vocab, options };
                });

                setQuestions(generated);
                setCurrentQIndex(0);
                setScore(0);
                setStreak(0);
                setSessionMistakes([]);
                setGameStartTime(Date.now());
                setTimeLeft(15);
                setShowAnswers(false);
                setSelectedOptionId(null);
                setAppState('playing');
                if (generated[0].type === 'eng-chi') speak(generated[0].correctWord.word);
            };

            useEffect(() => {
                if (appState !== 'playing' || showAnswers) return;
                if (timeLeft <= 0) { processAnswer(null); return; }
                const timer = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, appState, showAnswers]);

            const processAnswer = (selectedOption) => {
                if (showAnswers) return;

                const currentQ = questions[currentQIndex];
                const isCorrect = selectedOption && selectedOption.word === currentQ.correctWord.word;
                
                // 核心修復：先算出這一題之後的「當下真實數據」
                const nextScore = isCorrect ? score + 2 : score;
                const nextMistakes = isCorrect ? sessionMistakes : [...sessionMistakes, currentQ.correctWord];

                setSelectedOptionId(selectedOption ? selectedOption.word : null);
                setShowAnswers(true);

                if (isCorrect) setStreak(p => p + 1);
                else setStreak(0);

                // 更新狀態（用於 UI 顯示）
                setScore(nextScore);
                setSessionMistakes(nextMistakes);

                setTimeout(() => {
                    if (currentQIndex < questions.length - 1) {
                        const nextIdx = currentQIndex + 1;
                        setCurrentQIndex(nextIdx);
                        setTimeLeft(15);
                        setShowAnswers(false);
                        setSelectedOptionId(null);
                        if (questions[nextIdx].type === 'eng-chi') speak(questions[nextIdx].correctWord.word);
                    } else {
                        // 核心修復：最後一題直接傳入最新的分數與錯誤清單
                        finishGame(nextScore, nextMistakes);
                    }
                }, 600);
            };

            const finishGame = (finalScore, finalMistakes) => {
                const time = ((Date.now() - gameStartTime) / 1000).toFixed(1);
                setGameTotalTime(time);
                
                // 1. 更新歷史分數紀錄
                setPlayHistory(p => [...p, { score: finalScore, time }]);
                
                // 2. 更新錯題總累積次數
                setWordErrors(p => {
                    let updated = [...p];
                    finalMistakes.forEach(m => {
                        const ex = updated.find(e => e.word === m.word);
                        if (ex) ex.errorCount += 1; 
                        else updated.push({ ...m, errorCount: 1 });
                    });
                    return updated;
                });

                // 3. 更新等級掌握度（分析窗格）
                setLevelStats(prev => {
                    const next = { ...prev };
                    questions.forEach((q) => {
                        const lv = q.correctWord.level;
                        if (!next[lv]) next[lv] = { correct: 0, total: 0 };
                        next[lv].total += 1;
                        // 檢查這題是否在最終錯誤清單中
                        const wasWrong = finalMistakes.some(m => m.word === q.correctWord.word);
                        if (!wasWrong) next[lv].correct += 1;
                    });
                    return next;
                });

                (async () => {
    try {
        const playerId = await getOrCreatePlayer();
        if (!playerId) return;

        const totalQuestions = questions.length;

        const levelMap = {
            1: { correct: 0, total: 0 },
            2: { correct: 0, total: 0 },
            3: { correct: 0, total: 0 },
            4: { correct: 0, total: 0 },
            5: { correct: 0, total: 0 },
            6: { correct: 0, total: 0 }
        };

        questions.forEach((q) => {
            const lv = Number(q.correctWord.level);
            if (!levelMap[lv]) levelMap[lv] = { correct: 0, total: 0 };
            levelMap[lv].total += 1;

            const wasWrong = finalMistakes.some(m => m.word === q.correctWord.word);
            if (!wasWrong) levelMap[lv].correct += 1;
        });

        const safeAccuracy = (lv) => {
            const total = levelMap[lv]?.total || 0;
            const correct = levelMap[lv]?.correct || 0;
            if (total === 0) return null;
            return Math.round((correct / total) * 100);
        };

        const { data: sessionData, error: sessionError } = await supabaseClient
            .from("game_sessions")
            .insert([{
                player_id: playerId,
                duration_seconds: Math.round(Number(time)),
                score: finalScore,
                total_questions: totalQuestions,
                level_1_accuracy: safeAccuracy(1),
                level_2_accuracy: safeAccuracy(2),
                level_3_accuracy: safeAccuracy(3),
                level_4_accuracy: safeAccuracy(4),
                level_5_accuracy: safeAccuracy(5),
                level_6_accuracy: safeAccuracy(6)
            }])
            .select("id")
            .single();

        if (sessionError) {
            console.error("寫入 game_sessions 失敗", sessionError);
            return;
        }

        const answerRows = questions.map((q) => {
            const wasWrong = finalMistakes.some(m => m.word === q.correctWord.word);
            return {
                session_id: sessionData.id,
                player_id: playerId,
                word: q.correctWord.word,
                level: Number(q.correctWord.level),
                question_type: q.type,
                is_correct: !wasWrong,
                selected_answer: null,
                correct_answer: q.correctWord.translation || q.correctWord.word
            };
        });

        const { error: answersError } = await supabaseClient
            .from("answers")
            .insert(answerRows);

        if (answersError) {
            console.error("寫入 answers 失敗", answersError);
        }
    } catch (err) {
        console.error("Supabase 寫入失敗", err);
    }
})();

                setAppState('result');
            };

            // --- Home Screen ---
            if (appState === 'home') {
                return (
                    <div className="min-h-screen max-w-md mx-auto py-8 px-5 flex flex-col space-y-6">
                        <header className="text-center space-y-2 pt-4">
                            <h1 className="text-3xl text-indigo-950 tracking-tight font-normal">老兄該背單字囉</h1>
                            <div className="inline-block px-4 py-1.5 bg-white border border-indigo-100 text-indigo-600 rounded-full text-xs shadow-sm font-normal">
                                學測倒數 {daysToGSAT} 天
                            </div>
                        </header>

                        <section className="grid grid-cols-3 gap-3 font-normal">
                            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                                <div className="text-[10px] text-slate-400 uppercase mb-1 tracking-wider">總遊玩</div>
                                <div className="text-2xl text-slate-800">{totalPlays}</div>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                                <div className="text-[10px] text-slate-400 uppercase mb-1 tracking-wider">歷史平均</div>
                                <div className="text-2xl text-indigo-600">{historicalAvg}</div>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                                <div className="text-[10px] text-slate-400 uppercase mb-1 tracking-wider">近三次</div>
                                <div className="text-2xl text-emerald-600">{recentAvg}</div>
                                {totalPlays > 0 && (
                                    <span className={`absolute -bottom-1 left-0 right-0 text-[9px] py-0.5 ${progressDiff >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                        {progressDiff >= 0 ? '▲' : '▼'} {Math.abs(progressDiff)}
                                    </span>
                                )}
                            </div>
                        </section>

                        <section className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
                            <div className="flex justify-between items-center px-1">
                                <h3 className="text-sm text-slate-700 flex items-center tracking-tight font-normal">
                                    <Icons.BarChart className="w-4 h-4 mr-2 text-indigo-500" /> 等級掌握度分析
                                </h3>
                                <span className="text-[10px] text-slate-300 font-normal">智慧統計</span>
                            </div>
                            <div className="space-y-4 font-normal">
                                {['1','2','3','4','5','6'].map(lv => {
                                    const stats = levelStats[lv] || { correct: 0, total: 0 };
                                    const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                                    const colors = { '1': 'bg-emerald-400', '2': 'bg-green-400', '3': 'bg-amber-400', '4': 'bg-orange-400', '5': 'bg-indigo-400', '6': 'bg-purple-500' };
                                    return (
                                        <div key={lv} className="space-y-1.5">
                                            <div className="flex justify-between text-[11px] px-1 font-normal">
                                                <span className="text-slate-400">LV.{lv}</span>
                                                <span className="text-slate-700">{pct}%</span>
                                            </div>
                                            <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${colors[lv]} transition-all duration-1000 ease-out rounded-full shadow-[0_0_8px_rgba(0,0,0,0.05)]`} style={{ width: `${pct}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 className="text-sm text-slate-700 mb-4 px-1 flex items-center font-normal">
                                <Icons.RotateCcw className="w-4 h-4 mr-2 text-slate-400"/> 複習級別選擇
                            </h3>
                            <div className="grid grid-cols-6 gap-2">
                                {['1','2','3','4','5','6'].map(l => (
                                    <button key={l} onClick={() => setSelectedLevels(p => p.includes(l) ? p.filter(i => i !== l) : [...p, l])}
                                        className={`py-3 rounded-xl text-xs transition-all border font-normal ${selectedLevels.includes(l) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-105' : 'bg-slate-50 text-slate-400 border-slate-100'}`}
                                    >L{l}</button>
                                ))}
                            </div>
                        </section>

                        <button onClick={startGame} className="w-full bg-indigo-600 text-white py-5 rounded-[2rem] shadow-xl shadow-indigo-100 active:scale-95 transition-all text-xl flex items-center justify-center space-x-3 font-normal">
                            <Icons.Play className="w-6 h-6" />
                            <span>開始挑戰 (共{ALL_VOCAB.length}詞)</span>
                        </button>

                        <a
    href="./dashboard.html"
    className="w-full bg-white text-slate-800 py-4 rounded-[2rem] shadow-sm border border-slate-200 flex items-center justify-center space-x-3 text-lg hover:bg-slate-50 active:scale-95 transition-all font-normal"
>
    <Icons.BarChart className="w-5 h-5 text-indigo-500" />
    <span>數據儀錶板</span>
</a>
                        
                        {topErrorsToDisplay.length > 0 && (
                            <section className="space-y-3 pt-2 font-normal">
                                <div className="flex items-center space-x-2 text-slate-500 text-sm px-1">
                                    <Icons.AlertTriangle className="w-4 h-4 text-amber-500" />
                                    <span>常錯單字複習</span>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {topErrorsToDisplay.map((w, i) => <Flashcard key={i} wordInfo={w} />)}
                                </div>
                            </section>
                        )}
                    </div>
                );
            }

            // --- Gameplay Screen ---
            if (appState === 'playing') {
                const q = questions[currentQIndex];
                return (
                    <div className="min-h-screen max-w-md mx-auto flex flex-col font-normal">
                        <nav className="bg-white p-6 sticky top-0 z-10 border-b border-slate-100 flex flex-col space-y-4">
                            <div className="flex justify-between items-end px-1">
                                <div>
                                    <span className="text-[10px] text-slate-400 block uppercase tracking-widest mb-0.5">Progress</span>
                                    <span className="text-slate-800 text-xl font-normal">{currentQIndex + 1} <span className="text-slate-300 text-sm">/ {questions.length}</span></span>
                                </div>
                                {streak > 1 && (
                                    <div className="streak-anim flex flex-col items-center">
                                        <span className="text-[10px] text-orange-500 uppercase tracking-tighter">Combo</span>
                                        <span className="text-2xl text-orange-500 leading-none">{streak}</span>
                                    </div>
                                )}
                                <div className="text-right">
                                    <span className="text-[10px] text-slate-400 block uppercase tracking-widest mb-0.5">Time Left</span>
                                    <span className={`text-xl ${timeLeft <= 5 ? 'text-rose-500 animate-pulse' : 'text-indigo-600'}`}>{timeLeft}s</span>
                                </div>
                            </div>
                            <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(99,102,241,0.3)]" style={{ width: `${(timeLeft/15)*100}%` }}></div>
                            </div>
                        </nav>

                        <main className="p-6 flex-1 flex flex-col space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-10 flex flex-col items-center justify-center min-h-[220px] text-center shadow-sm border border-slate-100 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-50"></div>
                                <button onClick={() => speak(q.correctWord.word)} className="absolute top-4 right-4 p-3 bg-indigo-50 rounded-full text-indigo-500 active:scale-125 transition-transform">
                                    <Icons.Volume className="w-5 h-5" />
                                </button>
                                {q.type === 'eng-chi' ? (
                                    <>
                                        <h2 className="text-4xl text-slate-800 mb-4 tracking-tight font-normal">{q.correctWord.word}</h2>
                                        <div className="flex space-x-2">
                                            <span className="text-[11px] px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg uppercase tracking-wide border border-indigo-100 font-normal">{q.correctWord.pos}</span>
                                            <span className="text-[11px] px-3 py-1 bg-slate-50 text-slate-500 rounded-lg uppercase tracking-wide border border-slate-100 font-mono font-normal">L{q.correctWord.level}</span>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <h2 className="text-3xl text-slate-800 mb-4 leading-snug font-normal">{q.correctWord.translation}</h2>
                                        <span className="text-[11px] px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg border border-indigo-100 font-normal">{q.correctWord.pos}</span>
                                    </>
                                )}
                            </div>

                            <div className="space-y-3.5 pb-8">
                                {q.options.map((opt, i) => {
                                    const isCorrect = opt.word === q.correctWord.word;
                                    const isSelected = selectedOptionId === opt.word;
                                    return (
                                        <button key={i} onClick={() => processAnswer(opt)} disabled={showAnswers}
                                            className={`w-full py-4 px-6 rounded-2xl border-2 text-left transition-all flex flex-col relative overflow-hidden shadow-sm active:translate-y-0.5 font-normal ${
                                                !showAnswers ? 'bg-white border-slate-100 active:border-indigo-400' :
                                                isCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-800 z-10' :
                                                isSelected ? 'bg-rose-50 border-rose-500 text-rose-800' : 'bg-slate-50 border-slate-100 opacity-40'
                                            }`}
                                        >
                                            <div className="flex justify-between items-center w-full">
                                                <span className={`text-lg leading-tight ${!showAnswers ? 'text-slate-700' : ''}`}>
                                                    {q.type === 'eng-chi' ? opt.translation : opt.word}
                                                </span>
                                                {showAnswers && isCorrect && <Icons.Check className="w-5 h-5 text-emerald-600" />}
                                                {showAnswers && isSelected && !isCorrect && <Icons.X className="w-5 h-5 text-rose-600" />}
                                            </div>
                                            <div className={`mt-1 text-[11px] uppercase tracking-wider transition-opacity ${showAnswers ? 'opacity-80' : 'opacity-0'} ${isCorrect ? 'text-emerald-600' : isSelected ? 'text-rose-600' : 'text-slate-400'}`}>
                                                {q.type === 'eng-chi' ? opt.word : opt.translation}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- Result Screen ---
            if (appState === 'result') {
                const colors = score <= 50 ? 'bg-slate-900 text-white' : score <= 80 ? 'bg-indigo-700 text-white' : 'bg-rose-600 text-white';
                return (
                    <div className={`min-h-screen max-w-md mx-auto ${colors} flex flex-col items-center py-12 px-6 transition-colors duration-1000`}>
                        <div className="w-full text-center space-y-2">
                            <div className="text-7xl mb-6 drop-shadow-2xl scale-110 font-normal">
                                {score >= 100 ? '👑' : score >= 80 ? '🔥' : score >= 60 ? '👌' : '💤'}
                            </div>
                            <h2 className="text-xs opacity-60 uppercase tracking-[0.3em] font-normal">Game Over</h2>
                            <div className="text-9xl mb-2 tracking-tighter drop-shadow-md font-normal">{score}</div>
                            <div className="inline-block px-5 py-2 bg-black/20 rounded-full text-[11px] tracking-wider uppercase border border-white/10 backdrop-blur-sm font-normal">
                                {gameTotalTime} SECONDS ELAPSED
                            </div>
                        </div>

                        <div className="w-full bg-white/10 backdrop-blur-2xl rounded-[2.5rem] p-7 border border-white/10 mt-10 mb-8 shadow-2xl overflow-hidden flex flex-col">
                            <h3 className="text-sm flex items-center mb-5 tracking-tight uppercase opacity-90 font-normal">
                                <Icons.AlertTriangle className="w-4 h-4 mr-2.5 text-yellow-300" /> Review Mistakes ({sessionMistakes.length})
                            </h3>
                            {sessionMistakes.length === 0 ? <p className="text-center py-10 text-lg font-normal">完美答題！你是單字王 🌟</p> : (
                                <div className="grid grid-cols-2 gap-4 max-h-[32vh] overflow-y-auto pr-1 custom-scrollbar pb-2">
                                    {sessionMistakes.map((m, i) => <Flashcard key={i} wordInfo={m} />)}
                                </div>
                            )}
                        </div>

                        <button onClick={() => setAppState('home')} className="w-full bg-white text-slate-900 py-5 rounded-[2rem] shadow-2xl flex items-center justify-center space-x-3 text-xl active:scale-95 transition-all hover:bg-slate-50 font-normal">
                            <Icons.RotateCcw className="w-6 h-6" />
                            <span>再次挑戰</span>
                        </button>
                    </div>
                );
            }
            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
